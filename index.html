<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background-color: black;   
  overflow: hidden; 
  position: relative;
}

  .wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%); /* perfect vertical + horizontal centering */
  width: 95vw;   /* scale relative to viewport */
  max-width: 1920px;
  height: 95vh;  /* scale relative to viewport height */
  max-height: 1080px;
}
  
iframe {
  width: 100%;  
  height: 100%;  
  border: none;
}
</style>
</head>
<body>
  
<div class="wrapper">
  <iframe src="https://lookerstudio.google.com/embed/reporting/48671945-6936-4bb3-9612-140403bb7234/page/B6LqF" allowfullscreen></iframe>

</div>
  
</body>

</html>
