<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .report-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .report-wrapper {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Desktop specific - ensure no scrolling needed */
        @media (min-width: 768px) {
            .report-wrapper {
                width: 95vw;
                height: 95vh;
            }
        }

        /* Mobile specific - center vertically */
        @media (max-width: 767px) {
            body {
                align-items: center;
            }
            
            .report-wrapper {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>
<body>
  
<div class="report-container">
        <div class="report-wrapper">
  <iframe src="https://lookerstudio.google.com/embed/reporting/48671945-6936-4bb3-9612-140403bb7234/page/B6LqF" allowfullscreensandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
    </div>
</body>
</html>
