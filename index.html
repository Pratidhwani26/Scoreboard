<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pratidhwani Scoreboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            position: fixed;
        }
        
        /* Container centers everything */
        .report-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            overflow: hidden;
        }
        
        /* Wrapper maintains 16:9 aspect ratio and scales to fit */
        .iframe-wrapper {
            position: relative;
            width: 90vw;
            aspect-ratio: 16 / 9;
            max-height: 90vh;
            max-width: calc(90vh * 16 / 9);
        }
        
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Desktop/Laptop specific - PERFECT, NO CHANGES */
        @media (min-width: 768px) {
            .iframe-wrapper {
                width: 95vw;
                max-height: 95vh;
                max-width: calc(95vh * 16 / 9);
            }
        }
        
        /* Tablet landscape */
        @media (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .iframe-wrapper {
                width: 90vw;
                max-height: 90vh;
                max-width: calc(90vh * 16 / 9);
            }
        }
        
        /* Mobile portrait - CENTERED, NO SCROLL, ZOOM ENABLED */
        @media (max-width: 767px) and (orientation: portrait) {
            html, body {
                overflow: hidden;
                position: fixed;
            }
            
            .report-container {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            .iframe-wrapper {
                width: 98vw;
                height: calc(98vw * 9 / 16);
                max-height: none;
                max-width: none;
            }
        }
        
        /* Mobile landscape - SCROLL ENABLED, ZOOM ENABLED */
        @media (max-width: 767px) and (orientation: landscape) {
            html {
                overflow: auto;
                overflow-x: hidden;
                position: static;
                height: auto;
                min-height: 100%;
            }
            
            body {
                overflow: auto;
                overflow-x: hidden;
                position: static;
                height: auto;
                min-height: 100vh;
            }
            
            .report-container {
                overflow: visible;
                height: auto;
                min-height: 100vh;
                padding: 20px 0;
            }
            
            .iframe-wrapper {
                position: relative;
                width: 95vw;
                height: calc(95vw * 9 / 16);
                max-height: none;
                max-width: none;
            }
            
            iframe {
                position: relative;
            }
        }
        
        /* Large screens - prevent oversizing */
        @media (min-width: 1400px) {
            .iframe-wrapper {
                max-width: 1366px;
                max-height: 768px;
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="iframe-wrapper">
            <iframe 
                src="https://lookerstudio.google.com/embed/reporting/48671945-6936-4bb3-9612-140403bb7234/page/B6LqF" 
                frameborder="0" 
                allowfullscreen
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
    </div>
</body>
</html>
