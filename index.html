<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Looker Studio Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            position: fixed;
        }

        /* Container centers everything */
        .report-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            overflow: hidden;
        }

        /* Default wrapper for 16:9 aspect ratio */
        .iframe-wrapper {
            position: relative;
            width: 88vw;
            aspect-ratio: 16 / 9;
            max-height: 88vh;
            max-width: calc(88vh * 16 / 9);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Desktop/Laptop - NO SCROLLING */
        @media (min-width: 1024px) {
            .iframe-wrapper {
                width: 90vw;
                max-height: 85vh;
                max-width: calc(85vh * 16 / 9);
            }
        }

        /* Large screens - prevent oversizing */
        @media (min-width: 1400px) {
            .iframe-wrapper {
                max-width: 1366px;
                max-height: 768px;
            }
        }

        /* Tablet landscape */
        @media (min-width: 768px) and (max-width: 1023px) and (orientation: landscape) {
            .iframe-wrapper {
                width: 88vw;
                max-height: 85vh;
                max-width: calc(85vh * 16 / 9);
            }
        }

        /* Mobile Portrait - FORCE LANDSCAPE by rotating 90deg clockwise */
        @media (max-width: 767px) and (orientation: portrait) {
            .iframe-wrapper {
                /* Width will become visual height after rotation */
                width: calc(90vw * 16 / 9);
                /* Height will become visual width after rotation */
                height: 90vw;
                transform: rotate(90deg);
                transform-origin: center center;
                aspect-ratio: unset;
            }
        }

        /* Mobile Landscape - normal display */
        @media (max-width: 767px) and (orientation: landscape) {
            .iframe-wrapper {
                width: 95vw;
                max-height: 90vh;
                max-width: calc(90vh * 16 / 9);
            }
        }

        /* Extra safeguard for very small laptop screens */
        @media (min-width: 768px) and (max-width: 1023px) and (orientation: portrait) {
            .iframe-wrapper {
                width: 85vw;
                max-height: 80vh;
                max-width: calc(80vh * 16 / 9);
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="iframe-wrapper">
            <iframe 
                src="https://lookerstudio.google.com/embed/reporting/48671945-6936-4bb3-9612-140403bb7234/page/B6LqF" 
                frameborder="0" 
                allowfullscreen 
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
    </div>
</body>
</html>
