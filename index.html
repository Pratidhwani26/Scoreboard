<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Looker Studio Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            position: fixed;
        }

        .report-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        .iframe-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mobile Portrait - centered with proper sizing */
        @media (max-width: 767px) and (orientation: portrait) {
            .iframe-wrapper {
                width: 100vw;
                height: calc(100vw * 9 / 16);
            }
        }

        /* Mobile Landscape - fit to screen */
        @media (max-width: 767px) and (orientation: landscape) {
            .iframe-wrapper {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="iframe-wrapper">
            <iframe 
                src="https://lookerstudio.google.com/embed/reporting/48671945-6936-4bb3-9612-140403bb7234/page/B6LqF" 
                frameborder="0" 
                allowfullscreen 
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
    </div>
</body>
</html>
